<!DOCTYPE html>
<html>
<head>
    <title>Student Mark Predictor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <h1>Student Mark Prediction</h1>

    <form action="/predict" method="post">
        <label>Study Hours</label><br>
        <input type="number" step="0.1" name="study_hours" required><br><br>

        <label>Previous Score</label><br>
        <input type="number" step="0.1" name="previous_score" required><br><br>

        <button type="submit">Predict</button>
    </form>

</body>
</html>
